name: Build & publish lmnr images
on:
  release:
    types:
      - published

env:
  REGISTRY_GH: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./app-server/Dockerfile
            context: ./app-server
            image: ghcr.io/lmnr-ai/app-server
          - dockerfile: ./frontend/Dockerfile
            context: ./frontend
            image: ghcr.io/lmnr-ai/frontend
            build-args: |
              NEXT_PUBLIC_APP_VERSION=${{ github.event.release.tag_name }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GH }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
