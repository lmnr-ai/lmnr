version: "0.8"
index_id: signal_events
doc_mapping:
  field_mappings:
    - name: id
      type: text
      tokenizer: raw
      fast: true
    - name: project_id
      type: text
      tokenizer: raw
      fast: true
      stored: false
    - name: signal_id
      type: text
      tokenizer: raw
      fast: true
    - name: trace_id
      type: text
      tokenizer: raw
      fast: true
    - name: run_id
      type: text
      tokenizer: raw
      fast: true
    - name: severity
      type: u64
      fast: true
      stored: false
    - name: timestamp
      type: datetime
      fast: true
      stored: false
    - name: name
      type: text
      tokenizer: default
      stored: false
      record: position
    - name: summary
      type: text
      tokenizer: default
      fast: false
      stored: false
      record: position
    - name: payload
      type: text
      tokenizer: default
      fast: false
      stored: false
      record: position
  tag_fields: []
  timestamp_field: timestamp
  partition_key: hash_mod(project_id, 100)
search_settings:
  default_search_fields: [summary, payload, name]
retention:
  period: 90 days
  schedule: daily
